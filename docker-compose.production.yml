services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sarahmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${DATABASE_NAME:-sarahmind_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PORT: 3000
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_USER: ${DATABASE_USER:-sarahmind}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env.production}
      DATABASE_NAME: ${DATABASE_NAME:-sarahmind_production}
      APP_HOST: ${APP_HOST:-sarahmind.cl}
      APP_URL_PROTOCOL: ${APP_URL_PROTOCOL:-https}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env.production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/rails/storage
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.sarahmind-web.rule=${TRAEFIK_HOST_RULE:-Host(`sarahmind.cl`)}
      - traefik.http.routers.sarahmind-web.entrypoints=websecure
      - traefik.http.routers.sarahmind-web.tls=true
      - traefik.http.routers.sarahmind-web.tls.certresolver=letsencrypt
      - traefik.http.services.sarahmind-web.loadbalancer.server.port=3000

networks:
  internal:
    name: sarahmind_internal
  proxy:
    external: true
    name: proxy

volumes:
  postgres_data:
  storage_data:
