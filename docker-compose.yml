services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sarahmind_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      # Evita mezclar binarios de esbuild (macOS) con el contenedor Linux
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: sarahmind_development
      RAILS_ENV: development
    depends_on:
      - db

volumes:
  postgres_data:
  web_node_modules:
